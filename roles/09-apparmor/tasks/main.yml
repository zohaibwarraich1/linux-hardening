# Role 09: Mandatory Access Control (AppArmor / SELinux)
# AppArmor on Debian/Ubuntu, SELinux on RedHat/Suse.
# Supports: Debian, RedHat, Suse
---

# ===== Debian/Ubuntu — AppArmor =====
- name: "09 — Install AppArmor packages (Debian)"
  ansible.builtin.apt:
    name:
      - apparmor
      - apparmor-utils
      - apparmor-profiles
      - apparmor-profiles-extra
    state: present
  when: ansible_facts['os_family'] == 'Debian'

- name: "09 — Ensure AppArmor service is enabled and started (Debian)"
  ansible.builtin.service:
    name: apparmor
    state: started
    enabled: yes
  when: ansible_facts['os_family'] == 'Debian'

- name: "09 — Enforce all AppArmor profiles (Debian)"
  ansible.builtin.shell: |
    aa-enforce /etc/apparmor.d/* 2>/dev/null || true
  changed_when: false
  when:
    - ansible_facts['os_family'] == 'Debian'
    - hardening_apparmor_enforce_all | bool

# ===== RHEL/CentOS/Fedora/SUSE — SELinux =====
- name: "09 — Install SELinux management tools (RedHat)"
  ansible.builtin.dnf:
    name:
      - libselinux
      - libselinux-utils
      - policycoreutils
      - policycoreutils-python-utils
      - selinux-policy
      - selinux-policy-targeted
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

- name: "09 — Install SELinux management tools (Suse)"
  community.general.zypper:
    name:
      - libselinux1
      - policycoreutils
      - selinux-policy
    state: present
  when: ansible_facts['os_family'] == 'Suse'
  ignore_errors: yes

- name: "09 — Set SELinux to enforcing in config"
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUX='
    line: "SELINUX={{ hardening_selinux_state }}"
  when: ansible_facts['os_family'] in ['RedHat', 'Suse']

- name: "09 — Set SELinux policy type"
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUXTYPE='
    line: "SELINUXTYPE={{ hardening_selinux_policy }}"
  when: ansible_facts['os_family'] in ['RedHat', 'Suse']

- name: "09 — Enable SELinux enforcing at runtime (no reboot)"
  ansible.builtin.command:
    cmd: setenforce 1
  changed_when: true
  failed_when: false
  when:
    - ansible_facts['os_family'] in ['RedHat', 'Suse']
    - hardening_selinux_state == 'enforcing'
