# Role 01: System Updates
# Ensures automatic security updates are configured.
# Supports: Debian (unattended-upgrades), RedHat (dnf-automatic), Suse (zypper)
---

# ===== Debian/Ubuntu — unattended-upgrades =====
- name: "01 — Install unattended-upgrades (Debian)"
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == 'Debian'

- name: "01 — Enable automatic security updates (Debian)"
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: '0644'
  when: ansible_facts['os_family'] == 'Debian'

- name: "01 — Ensure unattended-upgrades service is enabled (Debian)"
  ansible.builtin.service:
    name: unattended-upgrades
    state: started
    enabled: yes
  when: ansible_facts['os_family'] == 'Debian'

# ===== RHEL/CentOS/Fedora — dnf-automatic =====
- name: "01 — Install dnf-automatic (RedHat)"
  ansible.builtin.dnf:
    name: dnf-automatic
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

- name: "01 — Configure dnf-automatic for security updates (RedHat)"
  ansible.builtin.lineinfile:
    path: /etc/dnf/automatic.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^apply_updates', line: 'apply_updates = yes' }
    - { regexp: '^upgrade_type', line: 'upgrade_type = security' }
  loop_control:
    label: "{{ item.line }}"
  when: ansible_facts['os_family'] == 'RedHat'

- name: "01 — Enable dnf-automatic timer (RedHat)"
  ansible.builtin.service:
    name: dnf-automatic.timer
    state: started
    enabled: yes
  when: ansible_facts['os_family'] == 'RedHat'

# ===== SUSE — zypper automatic patches =====
- name: "01 — Install yast2-online-update-configuration (Suse)"
  community.general.zypper:
    name: yast2-online-update-configuration
    state: present
  when: ansible_facts['os_family'] == 'Suse'
