# roles/cis-filesystem/tasks/main.yml
---
# 1.1.1 - Disable unused filesystems
- name: "1.1.1 - Disable cramfs filesystem"
  ansible.builtin.copy:
    dest: /etc/modprobe.d/cramfs.conf
    content: |
      install cramfs /bin/true
      blacklist cramfs
    owner: root
    group: root
    mode: '0644'

- name: "1.1.1 - Disable freevxfs filesystem"
  ansible.builtin.copy:
    dest: /etc/modprobe.d/freevxfs.conf
    content: |
      install freevxfs /bin/true
      blacklist freevxfs
    owner: root
    group: root
    mode: '0644'

- name: "1.1.1 - Disable squashfs filesystem"
  ansible.builtin.copy:
    dest: /etc/modprobe.d/squashfs.conf
    content: |
      install squashfs /bin/true
      blacklist squashfs
    owner: root
    group: root
    mode: '0644'

- name: "1.1.1 - Disable udf filesystem"
  ansible.builtin.copy:
    dest: /etc/modprobe.d/udf.conf
    content: |
      install udf /bin/true
      blacklist udf
    owner: root
    group: root
    mode: '0644'

- name: "1.1.1 - Disable usb-storage"
  ansible.builtin.copy:
    dest: /etc/modprobe.d/usb-storage.conf
    content: |
      install usb-storage /bin/true
      blacklist usb-storage
    owner: root
    group: root
    mode: '0644'

# 1.4 - Secure boot settings
- name: "1.4.1 - Set permissions on bootloader config"
  ansible.builtin.file:
    path: /boot/grub/grub.cfg
    owner: root
    group: root
    mode: '0400'
  ignore_errors: yes

# 1.5 - Process hardening
- name: "1.5.1 - Ensure core dumps are restricted"
  ansible.builtin.copy:
    dest: /etc/security/limits.d/cis-coredump.conf
    content: |
      * hard core 0
    owner: root
    group: root
    mode: '0644'

- name: "1.5.1 - Set fs.suid_dumpable to 0"
  ansible.posix.sysctl:
    name: fs.suid_dumpable
    value: '0'
    sysctl_set: yes
    state: present
    reload: yes

- name: "1.5.3 - Enable ASLR"
  ansible.posix.sysctl:
    name: kernel.randomize_va_space
    value: '2'
    sysctl_set: yes
    state: present
    reload: yes
