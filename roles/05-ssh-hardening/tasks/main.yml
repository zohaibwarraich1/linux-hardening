# Role 05: SSH Hardening — Lynis SSH-7408
# Comprehensive SSH lockdown based on CIS and Lynis recommendations.
---
- name: "05 — Harden SSH configuration"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: 'sshd -t -f %s'
  loop:
    - { regexp: '^#?Port ', line: "Port {{ hardening_ssh_port }}" }
    - { regexp: '^#?LogLevel', line: "LogLevel {{ hardening_ssh_log_level }}" }
    - { regexp: '^#?MaxAuthTries', line: "MaxAuthTries {{ hardening_ssh_max_auth_tries }}" }
    - { regexp: '^#?MaxSessions', line: "MaxSessions {{ hardening_ssh_max_sessions }}" }
    - { regexp: '^#?ClientAliveInterval', line: "ClientAliveInterval {{ hardening_ssh_client_alive_interval }}" }
    - { regexp: '^#?ClientAliveCountMax', line: "ClientAliveCountMax {{ hardening_ssh_client_alive_count_max }}" }
    - { regexp: '^#?LoginGraceTime', line: "LoginGraceTime {{ hardening_ssh_login_grace_time }}" }
    - { regexp: '^#?PermitRootLogin', line: "PermitRootLogin {{ hardening_ssh_permit_root_login }}" }
    - { regexp: '^#?PermitEmptyPasswords', line: "PermitEmptyPasswords {{ hardening_ssh_permit_empty_passwords }}" }
    - { regexp: '^#?X11Forwarding', line: "X11Forwarding {{ hardening_ssh_x11_forwarding }}" }
    - { regexp: '^#?AllowTcpForwarding', line: "AllowTcpForwarding {{ hardening_ssh_allow_tcp_forwarding }}" }
    - { regexp: '^#?AllowAgentForwarding', line: "AllowAgentForwarding {{ hardening_ssh_allow_agent_forwarding }}" }
    - { regexp: '^#?TCPKeepAlive', line: "TCPKeepAlive {{ hardening_ssh_tcp_keep_alive }}" }
    - { regexp: '^#?UsePAM', line: "UsePAM {{ hardening_ssh_use_pam }}" }
    - { regexp: '^#?IgnoreRhosts', line: "IgnoreRhosts yes" }
    - { regexp: '^#?HostbasedAuthentication', line: "HostbasedAuthentication no" }
    - { regexp: '^#?Banner', line: "Banner /etc/issue.net" }
  loop_control:
    label: "{{ item.line }}"
  notify: Restart sshd

- name: "05 — Disable SSH password authentication (optional)"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: "PasswordAuthentication no"
    validate: 'sshd -t -f %s'
  notify: Restart sshd
  when: hardening_ssh_disable_password_auth | bool

- name: "05 — Set SSH config file permissions"
  ansible.builtin.file:
    path: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
