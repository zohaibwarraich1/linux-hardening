# Role 08: Audit & Logging — Handlers
# auditd requires special restart handling on RHEL (RefuseManualStop=yes)
---
- name: Restart auditd
  ansible.builtin.command:
    cmd: service auditd restart
  changed_when: true

- name: Load audit rules
  ansible.builtin.command:
    cmd: augenrules --load
  changed_when: true
