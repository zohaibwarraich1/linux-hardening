# Role 13: Additional Hardening
# Process accounting, sysstat, fail2ban, security packages, service cleanup.
# Supports: Debian, RedHat, Suse
---
# ===== Process Accounting — ACCT-9622 =====
- name: "13 — Install process accounting"
  ansible.builtin.package:
    name: "{{ hardening_pkg_accounting[ansible_os_family] | default('acct') }}"
    state: present

- name: "13 — Enable process accounting service"
  ansible.builtin.service:
    name: "{{ (ansible_os_family == 'RedHat') | ternary('psacct', 'acct') }}"
    state: started
    enabled: yes
  ignore_errors: yes

# ===== sysstat — ACCT-9626 =====
- name: "13 — Install sysstat"
  ansible.builtin.package:
    name: sysstat
    state: present

- name: "13 — Enable sysstat data collection (Debian)"
  ansible.builtin.lineinfile:
    path: /etc/default/sysstat
    regexp: '^ENABLED='
    line: 'ENABLED="true"'
  when: ansible_os_family == 'Debian'

- name: "13 — Enable sysstat service"
  ansible.builtin.service:
    name: sysstat
    state: started
    enabled: yes

# ===== Security packages (Debian-specific) =====
- name: "13 — Install Debian-specific security packages"
  ansible.builtin.apt:
    name:
      - debsums             # PKGS-7370
      - apt-show-versions   # PKGS-7394
      - libpam-tmpdir       # DEB-0280
      - needrestart         # Best practice
    state: present
  ignore_errors: yes
  when: ansible_os_family == 'Debian'

# apt-listbugs — DEB-0810 (Debian only)
- name: "13 — Install apt-listbugs (Debian)"
  ansible.builtin.apt:
    name: apt-listbugs
    state: present
  ignore_errors: yes
  when: ansible_os_family == 'Debian'

# RedHat-specific security packages
- name: "13 — Install RedHat security packages"
  ansible.builtin.dnf:
    name:
      - dnf-plugin-post-transaction-actions
      - yum-utils
    state: present
  ignore_errors: yes
  when: ansible_os_family == 'RedHat'

# ===== fail2ban — DEB-0880 =====
- name: "13 — Install fail2ban"
  ansible.builtin.package:
    name: fail2ban
    state: present
  when: hardening_install_fail2ban | bool

- name: "13 — Create fail2ban local config"
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5
      backend = systemd

      [sshd]
      enabled = true
      port = {{ hardening_ssh_port }}
      filter = sshd
      maxretry = 3
      bantime = 3600
    owner: root
    group: root
    mode: '0644'
  when: hardening_install_fail2ban | bool
  notify: Restart fail2ban

- name: "13 — Enable fail2ban service"
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: yes
  when: hardening_install_fail2ban | bool

# ===== Disable unnecessary services =====
- name: "13 — Disable unnecessary services"
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop: "{{ hardening_disabled_services }}"
  ignore_errors: yes

# ===== Remove insecure packages =====
- name: "13 — Remove insecure packages (Debian)"
  ansible.builtin.apt:
    name:
      - telnet
      - rsh-client
      - talk
      - nis
    state: absent
  ignore_errors: yes
  when: ansible_os_family == 'Debian'

- name: "13 — Remove insecure packages (RedHat)"
  ansible.builtin.dnf:
    name:
      - telnet
      - rsh
      - talk
      - ypbind
    state: absent
  ignore_errors: yes
  when: ansible_os_family == 'RedHat'

- name: "13 — Remove insecure packages (Suse)"
  community.general.zypper:
    name:
      - telnet
      - rsh
      - talk
    state: absent
  ignore_errors: yes
  when: ansible_os_family == 'Suse'

# ===== FQDN in /etc/hosts — NAME-4404 =====
- name: "13 — Ensure FQDN is in /etc/hosts"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ ansible_fqdn }} {{ ansible_hostname }}"
    state: present
  when: ansible_fqdn is defined and ansible_fqdn != ""

# ===== Restrict compiler permissions — HRDN-7222 =====
- name: "13 — Find compilers on the system"
  ansible.builtin.command:
    cmd: which gcc g++ cc make
  register: compiler_paths
  changed_when: false
  failed_when: false
  when: hardening_restrict_compilers | bool

- name: "13 — Restrict compiler permissions to root only"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: '0700'
  loop: "{{ compiler_paths.stdout_lines | default([]) }}"
  when:
    - hardening_restrict_compilers | bool
    - compiler_paths.stdout_lines is defined
    - compiler_paths.stdout_lines | length > 0
  ignore_errors: yes

# ===== Restrict su access =====
- name: "13 — Restrict su to sudo/wheel group"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/su
    regexp: '^#?\s*auth\s+required\s+pam_wheel\.so'
    line: 'auth       required   pam_wheel.so use_uid'
    state: present

# ===== Secure permissions on sensitive files =====
- name: "13 — Set secure permissions on passwd/shadow/group files"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: '/etc/passwd', group: 'root', mode: '0644' }
    - { path: '/etc/passwd-', group: 'root', mode: '0600' }
    - { path: '/etc/shadow', group: 'shadow', mode: '0640' }
    - { path: '/etc/shadow-', group: 'shadow', mode: '0600' }
    - { path: '/etc/group', group: 'root', mode: '0644' }
    - { path: '/etc/group-', group: 'root', mode: '0600' }
    - { path: '/etc/gshadow', group: 'shadow', mode: '0640' }
    - { path: '/etc/gshadow-', group: 'shadow', mode: '0600' }
  loop_control:
    label: "{{ item.path }}"
  ignore_errors: yes

# ===== Ensure time synchronization =====
- name: "13 — Ensure time synchronization is running"
  ansible.builtin.service:
    name: "{{ (ansible_os_family == 'RedHat') | ternary('chronyd', 'systemd-timesyncd') }}"
    state: started
    enabled: yes
  ignore_errors: yes
