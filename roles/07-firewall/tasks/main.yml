# Role 07: Firewall (UFW) — Fixes FIRE-4512 warning
# Configures UFW with deny-by-default + allowed ports.
---
- name: "07 — Install UFW"
  ansible.builtin.apt:
    name: ufw
    state: present

- name: "07 — Set UFW default incoming policy to deny"
  community.general.ufw:
    default: "{{ hardening_ufw_default_incoming }}"
    direction: incoming

- name: "07 — Set UFW default outgoing policy to allow"
  community.general.ufw:
    default: "{{ hardening_ufw_default_outgoing }}"
    direction: outgoing

- name: "07 — Allow configured ports through UFW"
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment | default('') }}"
  loop: "{{ hardening_ufw_allowed_ports }}"
  loop_control:
    label: "{{ item.comment | default(item.port) }}"

- name: "07 — Enable UFW logging"
  community.general.ufw:
    logging: 'on'
  when: hardening_ufw_enable_logging | bool

- name: "07 — Enable UFW"
  community.general.ufw:
    state: enabled
