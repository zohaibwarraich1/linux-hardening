# Role 07: Firewall — Fixes FIRE-4512 warning
# Supports: UFW (Debian/Ubuntu) and firewalld (RedHat/Suse)
---

# ===== Debian/Ubuntu — UFW =====
- name: "07 — Install UFW (Debian)"
  ansible.builtin.apt:
    name: ufw
    state: present
  when: ansible_facts['os_family'] == 'Debian'

- name: "07 — Set UFW default incoming policy to deny"
  community.general.ufw:
    default: "{{ hardening_ufw_default_incoming }}"
    direction: incoming
  when: ansible_facts['os_family'] == 'Debian'

- name: "07 — Set UFW default outgoing policy to allow"
  community.general.ufw:
    default: "{{ hardening_ufw_default_outgoing }}"
    direction: outgoing
  when: ansible_facts['os_family'] == 'Debian'

- name: "07 — Allow configured ports through UFW"
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment | default('') }}"
  loop: "{{ hardening_ufw_allowed_ports }}"
  loop_control:
    label: "{{ item.comment | default(item.port) }}"
  when: ansible_facts['os_family'] == 'Debian'

- name: "07 — Enable UFW logging"
  community.general.ufw:
    logging: 'on'
  when:
    - ansible_facts['os_family'] == 'Debian'
    - hardening_ufw_enable_logging | bool

- name: "07 — Enable UFW"
  community.general.ufw:
    state: enabled
  when: ansible_facts['os_family'] == 'Debian'

# ===== RHEL/CentOS/Fedora/SUSE — firewalld =====
- name: "07 — Install firewalld (RedHat/Suse)"
  ansible.builtin.package:
    name: firewalld
    state: present
  when: ansible_facts['os_family'] in ['RedHat', 'Suse']

- name: "07 — Ensure firewalld is started and enabled"
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: yes
  when: ansible_facts['os_family'] in ['RedHat', 'Suse']

- name: "07 — Set firewalld default zone"
  ansible.builtin.command:
    cmd: "firewall-cmd --set-default-zone={{ hardening_firewalld_default_zone }}"
  register: _fw_zone_result
  changed_when: "'ZONE_ALREADY_SET' not in _fw_zone_result.stderr"
  failed_when:
    - _fw_zone_result.rc != 0
    - "'ZONE_ALREADY_SET' not in _fw_zone_result.stderr"
  when: ansible_facts['os_family'] in ['RedHat', 'Suse']

- name: "07 — Allow configured services through firewalld"
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: yes
    immediate: yes
    state: enabled
  loop: "{{ hardening_firewalld_allowed_services }}"
  when: ansible_facts['os_family'] in ['RedHat', 'Suse']

- name: "07 — Allow configured ports through firewalld"
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: yes
    immediate: yes
    state: enabled
  loop: "{{ hardening_firewalld_allowed_ports }}"
  when: ansible_facts['os_family'] in ['RedHat', 'Suse']

- name: "07 — Enable firewalld logging"
  ansible.builtin.command:
    cmd: "firewall-cmd --set-log-denied=all"
  changed_when: true
  when:
    - ansible_facts['os_family'] in ['RedHat', 'Suse']
    - hardening_firewalld_enable_logging | bool
